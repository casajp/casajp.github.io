<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CASA</title>
<style>
:root{--gold:#d7b46a;--cream:#fff7e6;--dark:#080706}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:#080706;color:#fff;font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif}
.app{position:fixed;inset:0;background:#000;overflow:hidden;touch-action:pan-y}
.scene{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1);opacity:1;transition:transform .7s cubic-bezier(.2,.8,.2,1),opacity .45s,filter .45s}
.scene.moving{transform:scale(1.08);filter:brightness(.8)}
.scene.walkToDoor{animation:walkToDoor 1.45s cubic-bezier(.18,.82,.2,1) forwards}
@keyframes walkToDoor{
  0%{transform:scale(1) translateY(0);filter:brightness(1)}
  45%{transform:scale(1.22) translateY(-2%);filter:brightness(.96)}
  100%{transform:scale(1.78) translateY(-6%);filter:brightness(.72)}
}
.doorFlash{position:absolute;inset:0;z-index:12;pointer-events:none;opacity:0;background:radial-gradient(circle at 50% 58%,rgba(255,236,178,.34),rgba(0,0,0,0) 36%);transition:opacity .28s}
.doorFlash.on{opacity:1}
.doorPanel{position:absolute;z-index:13;left:42%;top:38%;width:16%;height:38%;border-radius:5px;background:linear-gradient(90deg,rgba(0,0,0,.05),rgba(255,255,255,.08));border:1px solid rgba(255,255,255,.13);opacity:0;transform-origin:left center;pointer-events:none}
.doorPanel.open{opacity:1;animation:doorOpen .75s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes doorOpen{
  0%{transform:perspective(450px) rotateY(0deg);opacity:.2}
  25%{opacity:.65}
  100%{transform:perspective(450px) rotateY(-68deg);opacity:0}
}
.fade{position:absolute;inset:0;background:#050403;z-index:15;opacity:0;pointer-events:none;transition:opacity .42s}
.fade.on{opacity:.82}
.overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.38),transparent 24%,transparent 62%,rgba(0,0,0,.66));pointer-events:none}
.top{position:absolute;left:14px;right:14px;top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;z-index:8}
.logo,.help,.sound{background:rgba(0,0,0,.48);backdrop-filter:blur(12px);box-shadow:0 14px 50px rgba(0,0,0,.35)}
.logo{border:1px solid rgba(215,180,106,.45);border-radius:999px;padding:10px 16px;font-family:Georgia,serif;letter-spacing:.18em;color:#fff3cc}
.rightTop{display:flex;gap:7px;align-items:center}.help{border-radius:999px;padding:10px 12px;font-size:12px;color:#f1dfb7}
.sound,.topIcon{width:40px;height:40px;border-radius:999px;border:1px solid rgba(255,255,255,.13);color:#fff;background:rgba(0,0,0,.48);display:grid;place-items:center;text-decoration:none;font-size:18px}.topIcon{border-color:rgba(215,180,106,.45)}
.info{position:absolute;left:16px;right:16px;bottom:calc(62px + env(safe-area-inset-bottom));z-index:7;background:rgba(0,0,0,.46);backdrop-filter:blur(13px);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:13px 15px;transition:opacity .25s}
.info.hide{opacity:0}.info h1{margin:0 0 4px;font-size:18px;letter-spacing:.08em}.info p{margin:0;font-size:12px;color:#e9ddc4;line-height:1.55}
.enter{position:absolute;left:50%;bottom:calc(245px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:9;border:1px solid rgba(215,180,106,.72);background:rgba(0,0,0,.50);color:#fff;border-radius:999px;padding:12px 24px;letter-spacing:.18em;backdrop-filter:blur(12px);box-shadow:0 14px 55px rgba(0,0,0,.45);animation:pulse 2.1s infinite;font-family:Georgia,serif}
@keyframes pulse{50%{box-shadow:0 0 0 16px rgba(215,180,106,0),0 14px 55px rgba(0,0,0,.45)}}
.contact{display:none!important}
.contact.show{display:none!important}.contact.hide{display:none!important}
.contact a{text-decoration:none;color:#fff8df;background:rgba(0,0,0,.58);border:1px solid rgba(215,180,106,.55);border-radius:999px;padding:12px 10px;text-align:center;font-size:13px;backdrop-filter:blur(12px);box-shadow:0 12px 45px rgba(0,0,0,.38)}
.dots{position:absolute;left:50%;bottom:calc(28px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:8;display:flex;gap:7px;align-items:center}.dot{width:7px;height:7px;border-radius:999px;background:rgba(255,255,255,.35);transition:.25s}.dot.active{width:22px;background:var(--gold)}
.hotspot{position:absolute;z-index:7;width:46px;height:46px;border-radius:50%;border:1px solid rgba(215,180,106,.6);background:rgba(0,0,0,.58);color:#fff;display:grid;place-items:center;font-size:20px;transform:translate(-50%,-50%);backdrop-filter:blur(12px);box-shadow:0 12px 45px rgba(0,0,0,.4)}
.hotspot::after{content:"";position:absolute;inset:-9px;border:1px solid rgba(215,180,106,.45);border-radius:50%;animation:ring 1.7s infinite}@keyframes ring{from{transform:scale(.78);opacity:.9}to{transform:scale(1.35);opacity:0}}
.hotspot span{position:absolute;top:51px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:11px;background:rgba(0,0,0,.55);padding:5px 8px;border-radius:999px;color:#fff1cc}
.arrows{position:absolute;left:0;right:0;top:50%;z-index:4;display:flex;justify-content:space-between;pointer-events:none;padding:0 10px}.arrow{width:38px;height:38px;border-radius:999px;background:rgba(0,0,0,.28);display:grid;place-items:center;color:#fff8d8;opacity:.62}
.modal{position:absolute;inset:0;z-index:20;background:rgba(0,0,0,.94);display:none;align-items:center;justify-content:center;padding:14px;touch-action:pan-y}.modal.open{display:flex;animation:modalIn .22s ease}@keyframes modalIn{from{opacity:0}to{opacity:1}}
.modal img{max-width:100%;max-height:88vh;object-fit:contain;border-radius:16px;box-shadow:0 24px 80px rgba(0,0,0,.7);animation:photoIn .28s ease}@keyframes photoIn{from{transform:scale(.96);opacity:.4}to{transform:scale(1);opacity:1}}
.close{position:absolute;right:16px;top:calc(16px + env(safe-area-inset-top));width:48px;height:48px;border-radius:999px;border:0;background:rgba(255,255,255,.14);color:#fff;font-size:26px;backdrop-filter:blur(10px)}
.modalHint{position:absolute;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);font-size:12px;color:#ddd;background:rgba(0,0,0,.5);padding:8px 12px;border-radius:999px;white-space:nowrap}
@media(min-width:780px){.app{max-width:520px;left:50%;transform:translateX(-50%);box-shadow:0 0 100px #000}body{background:linear-gradient(90deg,#050403,#17110c,#050403)}}
</style>
</head>
<body>
<main class="app" id="app">
  <div class="scene" id="scene"></div><div class="overlay"></div><div class="doorFlash" id="doorFlash"></div><div class="doorPanel" id="doorPanel"></div><div class="fade" id="fade"></div>
  <div class="top"><div class="logo">CASA</div><div class="rightTop"><div class="help">左右スワイプで移動</div><a class="topIcon" id="mapTopLink" target="_blank" rel="noopener">📍</a><a class="topIcon" id="telTopLink">☎</a><button class="sound" id="soundBtn">🔊</button></div></div>
  <button class="enter" id="enter">OPEN</button>
  <div class="contact" id="contact"><a id="mapLink" target="_blank" rel="noopener">MAP</a><a id="telLink">TEL</a></div>
  <div id="hotspots"></div><div class="arrows"><div class="arrow">‹</div><div class="arrow">›</div></div>
  <section class="info" id="info"><h1 id="title"></h1><p id="desc"></p></section><div class="dots" id="dots"></div>
  <section class="modal" id="modal"><button class="close" id="close">×</button><img id="modalImg" alt=""><div class="modalHint" id="modalHint">商品写真も左右スワイプできます</div></section>
  <audio id="bellAudio" src="audio/bell.mp3" preload="auto"></audio><audio id="tapAudio" src="audio/tap.mp3" preload="auto"></audio><audio id="swipeAudio" src="audio/swipe.mp3" preload="auto"></audio>
</main>
<script>
const A="assets/";
const SHOP_ADDRESS="鹿児島県鹿児島市上之園町22-15 甲南パークマンション102 カーサ";
const TEMP_PHONE="099-000-0000";
const scenes=[
 {img:A+"exterior.jpg",title:"CASA",desc:"上の📍で地図、☎で電話。OPENで店内へ入れます。",enter:true,showContact:true,spots:[]},
 {img:A+"first.jpg",title:"入ってすぐ",desc:"入口すぐのコーディネート。光る丸をタップすると写真が開きます。",spots:[{x:56,y:42,label:"コーデ",gallery:"clothes",icon:"👗"},{x:22,y:46,label:"バッグ",gallery:"bags",icon:"👜"}]},
 {img:A+"center.jpg",title:"店内中央",desc:"左右スワイプで店内を進みます。気になる商品だけタップしてください。",spots:[{x:48,y:42,label:"ポーチ",gallery:"pouches",icon:"👜"},{x:70,y:37,label:"洋服",gallery:"clothes",icon:"👗"}]},
 {img:A+"pouch1.jpg",title:"ポーチコーナー",desc:"カラフルなポーチをタップで拡大表示できます。",spots:[{x:32,y:40,label:"ポーチ",gallery:"pouches",icon:"👜"},{x:68,y:43,label:"ポーチ",gallery:"pouches",icon:"✨"}]},
 {img:A+"sofa.jpg",title:"小物・雑貨",desc:"雑貨や小物の雰囲気も写真で見られます。",spots:[{x:37,y:40,label:"猫",gallery:"sofa",icon:"🐈"},{x:52,y:56,label:"小物",gallery:"treasure",icon:"💎"}]},
 {img:A+"green_coord2.jpg",title:"洋服コーナー",desc:"コーディネート写真をまとめて見られます。",spots:[{x:52,y:45,label:"コーデ",gallery:"clothes",icon:"👗"}]}
];
const galleries={clothes:[A+"white_coord.jpg",A+"green_coord1.jpg",A+"green_coord2.jpg",A+"lace_coord.jpg",A+"white_dress.jpg",A+"orange_coord.jpg",A+"first.jpg"],bags:[A+"first.jpg",A+"green_coord1.jpg"],pouches:[A+"pouch1.jpg",A+"pouch2.jpg",A+"pouch3.jpg",A+"pouch4.jpg"],sofa:[A+"sofa.jpg"],treasure:[A+"treasure.jpg",A+"sofa.jpg"]};
let index=0,modalGallery=[],modalIndex=0,soundOn=true,busy=false;
const scene=document.getElementById("scene"),fade=document.getElementById("fade"),doorFlash=document.getElementById("doorFlash"),doorPanel=document.getElementById("doorPanel"),title=document.getElementById("title"),desc=document.getElementById("desc"),enter=document.getElementById("enter"),hotspots=document.getElementById("hotspots"),dots=document.getElementById("dots"),app=document.getElementById("app"),modal=document.getElementById("modal"),modalImg=document.getElementById("modalImg"),contact=document.getElementById("contact"),soundBtn=document.getElementById("soundBtn"),info=document.getElementById("info");
const bell=document.getElementById("bellAudio"),tap=document.getElementById("tapAudio"),swipe=document.getElementById("swipeAudio");
const mapUrl="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(SHOP_ADDRESS);
const telUrl="tel:"+TEMP_PHONE.replaceAll("-","");
document.getElementById("mapLink").href=mapUrl;
document.getElementById("telLink").href=telUrl;
document.getElementById("mapTopLink").href=mapUrl;
document.getElementById("telTopLink").href=telUrl;
function play(a,vol=.4){if(!soundOn)return;try{a.pause();a.currentTime=0;a.volume=vol;a.play().catch(()=>{})}catch(e){}}
soundBtn.onclick=()=>{soundOn=!soundOn;soundBtn.textContent=soundOn?"🔊":"🔇";play(tap,.25)}
function render(animate=true){const s=scenes[index]; if(animate)scene.classList.add("moving"); setTimeout(()=>{scene.style.backgroundImage=`url("${s.img}")`;title.textContent=s.title;desc.textContent=s.desc;enter.style.display=s.enter?"block":"none";contact.classList.toggle("show",!!s.showContact);contact.classList.remove("hide");info.classList.remove("hide");hotspots.innerHTML="";s.spots.forEach(h=>{const b=document.createElement("button");b.className="hotspot";b.style.left=h.x+"%";b.style.top=h.y+"%";b.innerHTML=`${h.icon}<span>${h.label}</span>`;b.onclick=e=>{e.stopPropagation();play(tap,.25);openGallery(h.gallery)};hotspots.appendChild(b)});dots.innerHTML=scenes.map((_,i)=>`<div class="dot ${i===index?"active":""}"></div>`).join("");scene.classList.remove("moving")},animate?130:0)}
function next(){if(busy||index>=scenes.length-1)return;index++;play(swipe,.2);render(true)}
function prev(){if(busy||index<=0)return;index--;play(swipe,.2);render(true)}
enter.onclick=()=>{if(busy)return;busy=true;play(tap,.25);enter.style.display="none";contact.classList.add("hide");info.classList.add("hide");hotspots.innerHTML="";scene.classList.add("walkToDoor");setTimeout(()=>doorFlash.classList.add("on"),520);setTimeout(()=>{play(bell,.45);doorPanel.classList.add("open")},920);setTimeout(()=>fade.classList.add("on"),1200);setTimeout(()=>{index=1;scene.classList.remove("walkToDoor");scene.style.backgroundImage=`url("${scenes[index].img}")`;render(false);doorFlash.classList.remove("on");doorPanel.classList.remove("open");fade.classList.remove("on");busy=false},1650)};
let startX=0,startY=0,tracking=false;
app.addEventListener("touchstart",e=>{if(modal.classList.contains("open")||busy)return;tracking=true;startX=e.touches[0].clientX;startY=e.touches[0].clientY},{passive:true});
app.addEventListener("touchend",e=>{if(!tracking||modal.classList.contains("open")||busy)return;const dx=e.changedTouches[0].clientX-startX,dy=e.changedTouches[0].clientY-startY;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.2){dx<0?next():prev()}tracking=false},{passive:true});
function openGallery(name){modalGallery=galleries[name]||[];modalIndex=0;updateModal();modal.classList.add("open")}
function updateModal(){modalImg.src=modalGallery[modalIndex];document.getElementById("modalHint").textContent=(modalIndex+1)+" / "+modalGallery.length+"　左右スワイプ"}
document.getElementById("close").onclick=()=>{play(tap,.2);modal.classList.remove("open")};
let mStartX=0,mStartY=0;
modal.addEventListener("touchstart",e=>{mStartX=e.touches[0].clientX;mStartY=e.touches[0].clientY},{passive:true});
modal.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-mStartX,dy=e.changedTouches[0].clientY-mStartY;if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)*1.2){play(swipe,.17);modalIndex=dx<0?(modalIndex+1)%modalGallery.length:(modalIndex-1+modalGallery.length)%modalGallery.length;updateModal()}},{passive:true});
modal.addEventListener("click",e=>{if(e.target===modal)modal.classList.remove("open")});
document.addEventListener("keydown",e=>{if(modal.classList.contains("open")){if(e.key==="Escape")modal.classList.remove("open");if(e.key==="ArrowRight"){modalIndex=(modalIndex+1)%modalGallery.length;updateModal()}if(e.key==="ArrowLeft"){modalIndex=(modalIndex-1+modalGallery.length)%modalGallery.length;updateModal()}}else{if(e.key==="ArrowRight")next();if(e.key==="ArrowLeft")prev()}});
render(false);
</script>
</body>
</html>
